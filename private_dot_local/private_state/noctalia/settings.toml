[bar.default]
background_opacity = 0.4999999888241291
center = [ "audio_visualizer" ]
end = [
    "media",
    "tray",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "control-center",
    "battery",
    "session"
]
margin_edge = 12
margin_ends = 12
position = "right"
scale = 1.25
start = [ "notifications", "clock", "workspaces" ]
thickness = 50
widget_spacing = 12

[desktop_widgets]
enabled = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 823.0
    cy = 906.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
app_icon_colorize = true
password_style = "random"
polkit_agent = true
settings_show_advanced = true
ui_scale = 1.5000000149011612

    [shell.animation]
    speed = 0.80000001192092896

    [shell.screen_corners]
    enabled = true

[theme]
builtin = "Rosé Pine"
community_palette = "Hexa34C"
mode = "light"
wallpaper_scheme = "m3-monochrome"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme", "kitty", "niri", "qt", "starship" ]
    community_ids = [ "pi-agent", "obsidian", "zed", "discord" ]

[wallpaper]
directory = "/home/garlic/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/garlic/Pictures/Wallpapers/thought_cabinet.jpeg"

    [wallpaper.last]
    path = "/home/garlic/Pictures/Wallpapers/thought_cabinet.jpeg"

    [wallpaper.monitors.eDP-1]
    path = "/home/garlic/Pictures/Wallpapers/thought_cabinet.jpeg"

[widget.battery]
display_mode = "graphic"
show_label = false

[widget.brightness]
show_label = false

[widget.network]
show_label = false

[widget.volume]
show_label = false

[widget.workspaces]
hide_when_empty = true